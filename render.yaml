services:
  - type: web
    name: yanitliyor-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 30d
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        sync: false
